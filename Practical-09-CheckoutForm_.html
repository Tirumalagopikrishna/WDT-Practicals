<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f1f3f6;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar{
    background:#2874f0;
}
.navbar-brand{
    color:white !important;
    font-weight:bold;
}

/* Sections */
.card-box{
    background:white;
    padding:20px;
    border-radius:6px;
    margin-bottom:15px;
}

/* Hide steps */
.step{
    display:none;
}
.step.active{
    display:block;
}

/* Step header */
.step-header{
    font-weight:bold;
    margin-bottom:10px;
}

/* Summary */
.summary{
    position:sticky;
    top:20px;
}

/* Product */
.product{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
.product img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:6px;
}

/* Button */
.btn-pay{
    background:#fb641b;
    color:white;
    font-weight:bold;
}

/* Inputs */
.form-control{
    height:45px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container">
<span class="navbar-brand">Vinnu Store</span>
</div>
</nav>

<div class="container mt-4">

<div class="row">

<!-- LEFT -->
<div class="col-lg-8">

<!-- STEP 1: ADDRESS -->
<div class="card-box step active" id="step1">
<div class="step-header">1. Delivery Address</div>

<input class="form-control mb-2" placeholder="Full Name">
<input class="form-control mb-2" placeholder="Phone Number">
<input class="form-control mb-2" placeholder="Address">
<input class="form-control mb-2" placeholder="City">
<input class="form-control mb-2" placeholder="Pincode">

<button class="btn btn-pay mt-3" onclick="nextStep(2)">
Continue
</button>
</div>

<!-- STEP 2: PAYMENT -->
<div class="card-box step" id="step2">
<div class="step-header">2. Payment Options</div>

<div class="form-check mt-2">
<input class="form-check-input" type="radio" name="pay" checked>
<label>UPI / Wallet</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="pay">
<label>Credit / Debit Card</label>
</div>

<!-- Card Form -->
<div class="mt-3">
<input class="form-control mb-2" placeholder="Card Number">
<input class="form-control mb-2" placeholder="MM/YY">
<input class="form-control mb-2" placeholder="CVV">
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="pay">
<label>Cash on Delivery</label>
</div>

<button class="btn btn-pay mt-3" onclick="nextStep(3)">
Continue
</button>
</div>

<!-- STEP 3: REVIEW -->
<div class="card-box step" id="step3">
<div class="step-header">3. Review & Pay</div>

<p><strong>Items:</strong> Smartphone + Headphones</p>
<p><strong>Total:</strong> ₹2499</p>

<button class="btn btn-pay mt-3" onclick="payNow()">
Place Order & Pay
</button>
</div>

</div>

<!-- RIGHT -->
<div class="col-lg-4">

<div class="card-box summary">

<h5>Order Summary</h5>

<div class="product">
<img src="https://images.pexels.com/photos/788946/pexels-photo-788946.jpeg">
<div>
<strong>Smartphone</strong><br>
₹1999
</div>
</div>

<div class="product">
<img src="https://images.pexels.com/photos/3394650/pexels-photo-3394650.jpeg">
<div>
<strong>Headphones</strong><br>
₹500
</div>
</div>

<hr>

<div class="d-flex justify-content-between">
<span>Price</span>
<span>₹2499</span>
</div>

<div class="d-flex justify-content-between">
<span>Delivery</span>
<span class="text-success">FREE</span>
</div>

<hr>

<div class="d-flex justify-content-between">
<strong>Total</strong>
<strong>₹2499</strong>
</div>

</div>

</div>

</div>

</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

// STEP SWITCH
function nextStep(step){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+step).classList.add('active');
}

// PAYMENT
function payNow(){
    var options = {
        key: "YOUR_RAZORPAY_KEY",
        amount: 249900,
        currency: "INR",
        name: "Vinnu Store",
        description: "Order Payment",
        handler: function (){
            alert("Payment Successful 🎉");
        }
    };
    new Razorpay(options).open();
}

</script>

</body>
</html>
