<!DOCTYPE html>
<html>
<head>

<title>Travel Booking Website</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

/* HERO */

.hero{
background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
align-items:center;
color:white;
text-align:center;
}

/* LOGIN */

.login-section{
background:#1c1c1c;
padding:80px 0;
}

.login-card{
width:350px;
margin:auto;
padding:30px;
background:#2c2c2c;
border-radius:15px;
color:white;
}

/* BOOKING */

.booking-section{
background:linear-gradient(to right,#ffecd2,#fcb69f);
padding:80px 0;
display:none; /* hidden initially */
}

.booking-card{
width:400px;
margin:auto;
padding:30px;
background:white;
border-radius:15px;
}

/* FOOTER */

footer{
background:#000;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">🌍 TravelX</a>
</div>
</nav>

<!-- HERO -->

<section class="hero">

<div class="container" data-aos="fade-up">

<h1>Welcome to TravelX 🌍</h1>
<p>Login to continue booking</p>

<a href="#login" class="btn btn-warning mt-3">Login Now</a>

</div>

</section>

<!-- LOGIN -->

<section id="login" class="login-section" data-aos="fade-right">

<div class="login-card">

<h3 class="text-center mb-4">🔐 Login</h3>

<form onsubmit="return loginUser()">

<div class="input-group mb-3">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" id="email" class="form-control" placeholder="Email">
</div>

<div class="input-group mb-3">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" id="password" class="form-control" placeholder="Password">
</div>

<button class="btn btn-success w-100">Login</button>

</form>

</div>

</section>

<!-- BOOKING -->

<section id="booking" class="booking-section" data-aos="fade-left">

<div class="booking-card">

<h3 class="text-center mb-4 text-danger">🏨 Booking</h3>

<form onsubmit="return bookNow()">

<div class="input-group mb-3">
<span class="input-group-text"><i class="bi bi-person"></i></span>
<input type="text" id="name" class="form-control" placeholder="Full Name">
</div>

<input type="date" class="form-control mb-3">
<input type="date" class="form-control mb-3">

<select id="room" class="form-control mb-3">
<option value="">Select Room</option>
<option>Single</option>
<option>Double</option>
</select>

<button class="btn btn-danger w-100">Book Now</button>

</form>

</div>

</section>

<!-- FOOTER -->

<footer>
<p>© 2026 TravelX | Designed by Vinnu 💗</p>
</footer>

<!-- SCRIPTS -->

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// LOGIN FUNCTION
function loginUser(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(email=="" || pass==""){
alert("Please fill all login fields");
return false;
}

// show booking
document.getElementById("booking").style.display="block";

// scroll to booking
document.getElementById("booking").scrollIntoView({behavior:"smooth"});

alert("Login Successful! Now you can book.");

return false;
}

// BOOKING FUNCTION
function bookNow(){

let name=document.getElementById("name").value;
let room=document.getElementById("room").value;

if(name=="" || room==""){
alert("Please fill booking details");
return false;
}

alert("Booking Confirmed!");
return false;
}
</script>

</body>
</html>
