<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Listing Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f1ec;--ink:#1c1a17;--muted:#9a8f82;--accent:#d4622a;
      --white:#ffffff;--shadow:0 10px 40px rgba(28,26,23,.12);--r:16px;
    }
    body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:56px 20px 80px;
      background-image:radial-gradient(ellipse at 15% 15%,rgba(212,98,42,.06) 0%,transparent 50%),
                       radial-gradient(ellipse at 85% 85%,rgba(212,98,42,.06) 0%,transparent 50%);
    }
    h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);
      font-weight:700;margin-bottom:8px;text-align:center}
    .sub{color:var(--muted);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
      margin-bottom:48px;text-align:center}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,280px));
      gap:28px;justify-content:center;max-width:1100px;width:100%}

    /* CARD */
    .card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);
      overflow:hidden;display:flex;flex-direction:column;position:relative;
      transition:transform .35s cubic-bezier(.22,.68,0,1.2),box-shadow .35s ease;
      animation:rise .5s ease both}
    .card:nth-child(2){animation-delay:.1s}
    .card:nth-child(3){animation-delay:.2s}
    .card:nth-child(4){animation-delay:.3s}
    @keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .card:hover{transform:translateY(-7px) scale(1.01);box-shadow:0 24px 56px rgba(28,26,23,.18)}

    /* BADGE + WISHLIST */
    .badge{position:absolute;top:14px;left:14px;background:var(--accent);color:#fff;
      font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
      padding:4px 10px;border-radius:50px;z-index:2}
    .wish{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;
      align-items:center;justify-content:center;z-index:2;
      transition:transform .2s,background .2s;backdrop-filter:blur(4px)}
    .wish:hover{background:#fff;transform:scale(1.12)}
    .wish svg{width:16px;height:16px;transition:fill .2s,stroke .2s}
    .wish.on svg{fill:#e04545;stroke:#e04545}

    /* IMAGE — SVG placeholder */
    .img-wrap{height:220px;overflow:hidden;position:relative;background:#ede8df}
    .img-wrap svg{width:100%;height:100%;transition:transform .5s cubic-bezier(.22,.68,0,1.2)}
    .card:hover .img-wrap svg{transform:scale(1.06)}
    .overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(28,26,23,.68);
      color:#fff;font-size:11px;font-weight:500;letter-spacing:.14em;
      text-transform:uppercase;text-align:center;padding:11px;opacity:0;
      transform:translateY(100%);transition:opacity .28s,transform .28s;cursor:pointer}
    .card:hover .overlay{opacity:1;transform:translateY(0)}

    /* BODY */
    .body{padding:18px 18px 8px;flex:1;display:flex;flex-direction:column;gap:5px}
    .cat{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    .name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;line-height:1.2}
    .stars{display:flex;align-items:center;gap:5px;margin-top:3px}
    .s-icons{color:var(--accent);font-size:12px;letter-spacing:1px}
    .s-count{font-size:11px;color:var(--muted)}
    .prices{display:flex;align-items:baseline;gap:8px;margin-top:6px}
    .price{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700}
    .old{font-size:.88rem;color:var(--muted);text-decoration:line-through}
    .save{font-size:11px;color:var(--accent);background:rgba(212,98,42,.1);
      padding:2px 8px;border-radius:50px;font-weight:500}

    /* FOOTER */
    .foot{padding:12px 18px 18px;display:flex;gap:10px}
    .btn-q{width:44px;background:var(--bg);border:1.5px solid #ddd6cc;border-radius:10px;
      font-size:16px;color:var(--ink);cursor:pointer;display:flex;align-items:center;
      justify-content:center;transition:background .2s;position:relative}
    .btn-q:hover{background:#ede8de;border-color:var(--muted)}
    .qb{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#fff;
      font-size:10px;font-weight:600;min-width:18px;height:18px;border-radius:50px;
      display:none;align-items:center;justify-content:center;padding:0 4px}
    .btn-c{flex:1;padding:12px 16px;background:var(--ink);color:#fff;border:none;
      border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
      letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:7px;position:relative;overflow:hidden;
      transition:transform .18s}
    .btn-c::after{content:'';position:absolute;inset:0;background:var(--accent);
      transform:scaleX(0);transform-origin:left;
      transition:transform .3s cubic-bezier(.22,.68,0,1);z-index:0}
    .btn-c:hover::after{transform:scaleX(1)}
    .btn-c:hover{transform:translateY(-1px)}
    .btn-c:active{transform:scale(.97)}
    .btn-c span,.btn-c svg{position:relative;z-index:1}
    .btn-c.ok{background:#2e7d52}.btn-c.ok::after{display:none}
    .btn-c svg{width:15px;height:15px}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(70px);opacity:0;
      background:var(--ink);color:#fff;font-size:13px;padding:12px 24px;
      border-radius:50px;box-shadow:0 8px 30px rgba(0,0,0,.18);
      transition:transform .35s cubic-bezier(.22,.68,0,1.2),opacity .28s;
      pointer-events:none;z-index:999;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    @media(max-width:480px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<h1>Our Collection</h1>
<p class="sub">Handpicked for you</p>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>
<script>
const products=[
  {id:1,name:"Canvas Tote Bag",cat:"Accessories",price:89,old:120,rating:4.7,rev:214,badge:"Sale",
   bg:"#dfd5c5",icon:"M60,140 Q80,60 120,80 Q160,100 140,140 Q120,180 80,170 Q40,160 60,140Z M85,95 L95,65 L105,65 L115,95",stroke:"#a08060"},
  {id:2,name:"Ceramic Mug",cat:"Home & Living",price:44,old:null,rating:4.9,rev:388,badge:"New",
   bg:"#e8dfd0",icon:"M70,160 L70,90 Q70,75 85,75 L155,75 Q170,75 170,90 L170,160 Q170,175 155,175 L85,175 Q70,175 70,160Z M170,110 Q195,110 195,130 Q195,150 170,150",stroke:"#8b6f47"},
  {id:3,name:"Leather Watch",cat:"Watches",price:249,old:320,rating:4.6,rev:97,badge:"Bestseller",
   bg:"#d8cfc2",icon:"M120,120 m-45,0 a45,45 0 1,0 90,0 a45,45 0 1,0 -90,0 M120,80 L120,120 L148,120 M100,55 L140,55 M100,185 L140,185",stroke:"#5c4a35"},
  {id:4,name:"Sunglasses",cat:"Eyewear",price:135,old:null,rating:4.8,rev:156,badge:null,
   bg:"#cac3b8",icon:"M50,110 Q50,80 80,80 L110,80 Q125,80 125,110 Q125,130 110,130 L80,130 Q50,130 50,110Z M125,110 L115,110 M190,110 Q190,80 160,80 L130,80 Q115,80 115,110 Q115,130 130,130 L160,130 Q190,130 190,110Z M50,100 L30,95",stroke:"#3a3530"}
];
const cart={};const wl=new Set();
function st(r){return'★'.repeat(Math.floor(r))+(r%1>=.5?'½':'')+'☆'.repeat(5-Math.floor(r)-(r%1>=.5?1:0))}
function sp(p,o){return o?Math.round((1-p/o)*100):null}
function render(p){
  const s=sp(p.price,p.old);
  return`<div class="card">
    ${p.badge?`<span class="badge">${p.badge}</span>`:''}
    <button class="wish" onclick="tw(this,${p.id})" aria-label="Wishlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1c1a17" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
    <div class="img-wrap">
      <svg viewBox="0 0 240 220" xmlns="http://www.w3.org/2000/svg">
        <rect width="240" height="220" fill="${p.bg}"/>
        <path d="${p.icon}" fill="none" stroke="${p.stroke}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="overlay" onclick="toast('Quick view — ${p.name}')">⚡ Quick View</div>
    </div>
    <div class="body">
      <span class="cat">${p.cat}</span>
      <h2 class="name">${p.name}</h2>
      <div class="stars"><span class="s-icons">${st(p.rating)}</span><span class="s-count">${p.rating} (${p.rev})</span></div>
      <div class="prices">
        <span class="price">$${p.price}</span>
        ${p.old?`<span class="old">$${p.old}</span>`:''}
        ${s?`<span class="save">−${s}%</span>`:''}
      </div>
    </div>
    <div class="foot">
      <button class="btn-q" onclick="decQty(${p.id})" title="Remove one">
        <span id="qn${p.id}">−</span>
        <span class="qb" id="qb${p.id}"></span>
      </button>
      <button class="btn-c" id="cb${p.id}" onclick="addCart(${p.id},'${p.name}',${p.price})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span>Add to Cart</span>
      </button>
    </div>
  </div>`;
}
document.getElementById('grid').innerHTML=products.map(render).join('');
function addCart(id,name,price){
  cart[id]=(cart[id]||0)+1;
  const b=document.getElementById(`cb${id}`),
        qb=document.getElementById(`qb${id}`),
        qn=document.getElementById(`qn${id}`);
  b.classList.add('ok');b.querySelector('span').textContent='✓ Added';
  setTimeout(()=>{b.classList.remove('ok');b.querySelector('span').textContent='Add to Cart';},1800);
  qb.style.display='flex';qb.textContent=cart[id];qn.textContent=cart[id];
  toast(`"${name}" added — $${price}`);
}
function decQty(id){
  if(!cart[id])return;
  cart[id]=Math.max(0,cart[id]-1);
  const qb=document.getElementById(`qb${id}`),qn=document.getElementById(`qn${id}`);
  if(cart[id]===0){qb.style.display='none';qn.textContent='−';}
  else{qb.textContent=cart[id];qn.textContent=cart[id];}
}
function tw(btn,id){
  if(wl.has(id)){wl.delete(id);btn.classList.remove('on');toast('Removed from wishlist');}
  else{wl.add(id);btn.classList.add('on');toast('Saved to wishlist ♥');}
}
let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
</body>
</html>
